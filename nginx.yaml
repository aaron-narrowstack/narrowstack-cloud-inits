  # nginx template for making a shared app network - using traefik for dynamic capabilities
  mkdir -p /opt/app/nginx
  mkdir -p /opt/app/nginx/config
    cat > /opt/app/nginx/docker-compose.yml << 'NGINX'
    version: '3.8'
    services:
      nginx:
        image: lscr.io/linuxserver/nginx:latest
        container_name: nginx
        environment:
          - PUID=1000
          - PGID=1000
          - TZ=Etc/UTC
        volumes:
          - /opt/app/nginx/config:/config
        ports:
          - 80:80
          - 443:443
        networks:
          - app-network
        restart: unless-stopped
    networks:
      app-network:
        external: true 
    NGINX
