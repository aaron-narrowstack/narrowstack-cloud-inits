mkdir -p /opt/app/traefik/letsencrypt
touch /opt/app/traefik/letsencrypt/acme.json
chmod 600 /opt/app/traefik/letsencrypt/acme.json
cat > /opt/app/traefik/docker-compose.yml << 'TRAEFIK'
version: '3.8'
services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=you@example.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/app/traefik/letsencrypt:/letsencrypt
    networks:
      - app-network
    restart: unless-stopped
networks:
  app-network:
    external: true
TRAEFIK
